<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #EAEDED;
}

/* HEADER */
.header {
    background-color: #131921;
    color: white;
    display: flex;
    align-items: center;
    padding: 10px;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    margin-right: 20px;
}

.search-bar {
    flex: 1;
    display: flex;
}

.search-bar input {
    width: 100%;
    padding: 10px;
    border: none;
}

.search-bar button {
    background-color: #febd69;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
}

.nav {
    display: flex;
    gap: 20px;
    margin-left: 20px;
}

/* SUB HEADER */
.sub-header {
    background-color: #232F3E;
    color: white;
    padding: 8px;
    font-size: 14px;
}

/* HERO */
.hero img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* PRODUCTS */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 5px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: contain;
}

.title {
    font-size: 14px;
    margin: 10px 0;
}

.price {
    color: #B12704;
    font-weight: bold;
    font-size: 18px;
}

.rating {
    color: #FFA41C;
    font-size: 14px;
}

.btn {
    margin-top: 10px;
    padding: 8px;
    width: 100%;
    background-color: #FFD814;
    border: none;
    cursor: pointer;
    border-radius: 4px;
}

.btn:hover {
    background-color: #F7CA00;
}

/* FOOTER */
.footer {
    background-color: #131921;
    color: white;
    text-align: center;
    padding: 20px;
}

/* RESPONSIVE */
@media(max-width: 600px) {
    .nav {
        display: none;
    }
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">amazon</div>

    <div class="search-bar">
        <input type="text" placeholder="Search Amazon">
        <button>🔍</button>
    </div>

    <div class="nav">
        <div>Account</div>
        <div>Orders</div>
        <div>Cart 🛒</div>
    </div>
</div>

<!-- SUB HEADER -->
<div class="sub-header">
    All | Best Sellers | Mobiles | Electronics | Fashion | Home | Appliances
</div>

<!-- HERO IMAGE -->
<div class="hero">
    <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600" alt="Amazon Banner">
</div>

<!-- PRODUCTS -->
<div class="container">

    <!-- Headphones -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1580894894513-541e068a3e2b?w=400" alt="Headphones">
        <div class="title">Wireless Bluetooth Headphones</div>
        <div class="rating">⭐⭐⭐⭐☆</div>
        <div class="price">₹1,499</div>
        <button class="btn">Add to Cart</button>
    </div>

    <!-- Smart Watch -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b?w=400" alt="Smart Watch">
        <div class="title">Smart Watch Fitness Tracker</div>
        <div class="rating">⭐⭐⭐⭐⭐</div>
        <div class="price">₹2,999</div>
        <button class="btn">Add to Cart</button>
    </div>

    <!-- Shoes -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="Shoes">
        <div class="title">Men's Casual Shoes</div>
        <div class="rating">⭐⭐⭐⭐☆</div>
        <div class="price">₹1,199</div>
        <button class="btn">Add to Cart</button>
    </div>

    <!-- Mixer Grinder -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1626808642875-0aa545482dfb?w=400" alt="Mixer">
        <div class="title">Sun Flower</div>
        <div class="rating">⭐⭐⭐⭐☆</div>
        <div class="price">₹3,499</div>
        <button class="btn">Add to Cart</button>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Amazon Clone | Built for Practice
</div>

</body>
</html>
