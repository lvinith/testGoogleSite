<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Clone</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fff;
        }

        .logo {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #DB4437; }
        .logo span:nth-child(3) { color: #F4B400; }
        .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #0F9D58; }
        .logo span:nth-child(6) { color: #DB4437; }

        .search-box {
            width: 500px;
            max-width: 90%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-box:hover {
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        .buttons {
            margin-top: 20px;
        }

        .btn {
            margin: 5px;
            padding: 10px 20px;
            border: none;
            background-color: #f8f9fa;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn:hover {
            border: 1px solid #ccc;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>

    <input type="text" class="search-box" placeholder="Search Google or type a URL">

    <div class="buttons">
        <button class="btn">Google Search</button>
        <button class="btn">I'm Feeling Lucky</button>
    </div>

    <div class="footer">
        Google Clone - Demo
    </div>

</body>
</html>
